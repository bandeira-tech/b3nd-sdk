name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    name: SDK Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run SDK tests
        run: deno task test

  auth-tests:
    name: Auth Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run auth tests
        run: cd libs/b3nd-auth && deno test --allow-all

  encrypt-tests:
    name: Encrypt Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run encrypt tests
        run: cd libs/b3nd-encrypt && deno test --allow-all

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Start test server
        run: |
          cd tests
          deno run --allow-net --allow-env test-server.ts > /tmp/test-server.log 2>&1 &
          echo "TEST_SERVER_PID=$!" >> $GITHUB_ENV

          # Wait for server to be ready with retry logic
          echo "Waiting for test server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Test server is ready"
              exit 0
            fi
            echo "  Attempt $i/30: Server not ready yet, waiting..."
            sleep 1
          done

          echo "Test server failed to start"
          echo "Server logs:"
          cat /tmp/test-server.log
          exit 1

      - name: Run E2E write-list-read tests
        run: cd tests && E2E_BASE_URL=http://localhost:8000 deno task test:e2e:write-list-read

      # Note: crypto and auth E2E test suites are incomplete/under development
      # The write-list-read suite already tests encryption and authentication functionality

      - name: Stop test server
        if: always()
        run: |
          if [ ! -z "$TEST_SERVER_PID" ]; then
            echo "Stopping test server (PID: $TEST_SERVER_PID)..."
            kill $TEST_SERVER_PID 2>/dev/null || true
          fi
          # Also kill any remaining test-server.ts processes
          pkill -f "test-server.ts" || true
          # Show server logs if they exist
          if [ -f /tmp/test-server.log ]; then
            echo "Test server logs:"
            tail -50 /tmp/test-server.log || true
          fi

  build-api-docs:
    name: Build API Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build API docs (static only, no b3nd upload)
        env:
          B3ND_NODE_URL: ""
        run: DENO_NO_PACKAGE_JSON=1 deno run -A apps/b3nd-web-rig/scripts/build-api-docs.ts

      - name: Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: apps/b3nd-web-rig/public/api-docs/

  web-rig-build:
    name: Web Rig Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci && cd apps/b3nd-web-rig && npm ci

      - name: Build web rig
        run: cd apps/b3nd-web-rig && npx vite build

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run lint
        run: deno lint src/

      - name: Run format check
        run: deno fmt --check src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run type check
        run: deno check src/mod.ts apps/*/mod.ts libs/b3nd-*/mod.ts
