name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    name: SDK Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run SDK tests
        run: deno task test

  auth-tests:
    name: Auth Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run auth tests
        run: cd libs/b3nd-auth && deno test --allow-all

  encrypt-tests:
    name: Encrypt Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run encrypt tests
        run: cd libs/b3nd-encrypt && deno test --allow-all

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Start test server
        run: |
          cd tests
          deno run --allow-net --allow-env test-server.ts > /tmp/test-server.log 2>&1 &
          echo "TEST_SERVER_PID=$!" >> $GITHUB_ENV

          # Wait for server to be ready with retry logic
          echo "Waiting for test server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Test server is ready"
              exit 0
            fi
            echo "  Attempt $i/30: Server not ready yet, waiting..."
            sleep 1
          done

          echo "Test server failed to start"
          echo "Server logs:"
          cat /tmp/test-server.log
          exit 1

      - name: Run E2E write-list-read tests
        run: cd tests && E2E_BASE_URL=http://localhost:8000 deno task test:e2e:write-list-read

      # Note: crypto and auth E2E test suites are incomplete/under development
      # The write-list-read suite already tests encryption and authentication functionality

      - name: Stop test server
        if: always()
        run: |
          if [ ! -z "$TEST_SERVER_PID" ]; then
            echo "Stopping test server (PID: $TEST_SERVER_PID)..."
            kill $TEST_SERVER_PID 2>/dev/null || true
          fi
          # Also kill any remaining test-server.ts processes
          pkill -f "test-server.ts" || true
          # Show server logs if they exist
          if [ -f /tmp/test-server.log ]; then
            echo "Test server logs:"
            tail -50 /tmp/test-server.log || true
          fi

  build-api-docs:
    name: Build API Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build API docs (static only, no b3nd upload)
        env:
          B3ND_NODE_URL: ""
        run: DENO_NO_PACKAGE_JSON=1 deno run -A apps/b3nd-web-rig/scripts/build-api-docs.ts

      - name: Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: apps/b3nd-web-rig/public/api-docs/

  web-rig-build:
    name: Web Rig Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Guard against Deno-only specifiers in web-bundled libs
        run: |
          # libs/ code is aliased into the Vite bundle — any npm:/jsr: bare
          # specifiers will crash esbuild. Catch them before the build does.
          echo "Checking for Deno-only specifiers in libs/ source files..."
          if grep -rn --include='*.ts' --include='*.tsx' \
               -E '(import|from)\s+["\x27]npm:' \
               libs/b3nd-core libs/b3nd-hash libs/b3nd-auth libs/b3nd-encrypt \
               libs/b3nd-msg libs/b3nd-compose libs/b3nd-combinators \
               libs/b3nd-listener libs/b3nd-rig libs/b3nd-apps \
               libs/b3nd-client-http libs/b3nd-client-memory \
               libs/b3nd-wallet libs/b3nd-testing \
               libs/firecat-protocol 2>/dev/null; then
            echo ""
            echo "ERROR: Found npm: specifiers in libs that are bundled by Vite."
            echo "These will crash the web rig build. Use import maps in deno.json"
            echo "or dynamic imports behind a Deno runtime check instead."
            exit 1
          fi
          echo "No Deno-only specifiers found in web-bundled libs."

      - name: Install web rig dependencies
        run: cd apps/b3nd-web-rig && npm ci

      - name: Build web rig
        run: cd apps/b3nd-web-rig && npx vite build

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run lint
        run: deno lint src/

      - name: Run format check
        run: deno fmt --check src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run type check
        run: deno check src/mod.ts

  sqlite-integration-tests:
    name: SQLite Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run SQLite tests
        run: deno task test:integration:sqlite

  sdk-integration-tests:
    name: SDK Integration Tests (PostgreSQL + MongoDB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: b3nd_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d b3nd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:8
        ports:
          - 57017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run PostgreSQL tests
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:55432/b3nd_test
        run: deno task test:integration:postgres

      - name: Run MongoDB tests
        env:
          MONGODB_URL: mongodb://localhost:57017/b3nd_test
          MONGODB_DB: b3nd_test
          MONGODB_COLLECTION: b3nd_data
        run: deno task test:integration:mongo
