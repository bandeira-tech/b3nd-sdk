name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    name: SDK Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bandeira-tech/b3nd-core
          path: ../b3nd-core
      - uses: actions/checkout@v4
        with:
          repository: bandeira-tech/b3nd-canon
          path: ../b3nd-canon
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno task test

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno lint src/
      - run: deno fmt --check src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bandeira-tech/b3nd-core
          path: ../b3nd-core
      - uses: actions/checkout@v4
        with:
          repository: bandeira-tech/b3nd-canon
          path: ../b3nd-canon
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno check src/mod.ts

  npm-build:
    name: NPM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npx tsup
