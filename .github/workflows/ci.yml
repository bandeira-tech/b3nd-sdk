name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno lint src/
      - run: deno fmt --check src/

  type-check:
    name: Type Check (against JSR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      # deno.ci.json resolves @bandeira-tech/b3nd-core and b3nd-canon from
      # JSR (no cross-repo checkout). Workspace tests run locally via the
      # pre-push hook, where local-path imports are available.
      - run: deno check --config deno.ci.json src/mod.ts

  npm-build:
    name: NPM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npx tsup
